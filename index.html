ane ou œuf dur",emoji:"🍌",recipe:"Banane : source rapide d'énergie et de potassium.\nŒuf dur : cuire 9 min dans l'eau bouillante. Riche en protéines."},{id:7,name:"Egg bacon muffin",emoji:"🥚",recipe:"Couper un muffin complet en deux. Faire cuire un œuf à la poêle et quelques tranches de bacon allégé. Assembler."},{id:8,name:"Omelette blanc de poulet",emoji:"🍳",recipe:"Battre 2 œufs. Ajouter 80g de blanc de poulet cuit. Cuire à feu moyen avec une noisette d'huile d'olive. Assaisonner d'ail, persil, sel."},{id:9,name:"Toast beurre de cacahuètes / confiture",emoji:"🥜",recipe:"Toaster une tranche de pain de mie complet. Étaler 1 c. à soupe de beurre de cacahuètes protéines puis une fine couche de confiture 0% sucres."},{id:10,name:"Céréales fruits secs / chocolat noir",emoji:"🍫",recipe:"Verser une portion de céréales dans un bol. Ajouter du lait de soja froid."},{id:11,name:"Skyr",emoji:"🥛",recipe:"Servir 150-200g de skyr nature dans un bol. Ajouter des fruits frais ou une cuillère de miel. Très riche en protéines."},{id:12,name:"Flocons d'avoine au chocolat noir",emoji:"🌾",recipe:"Cuire 50g de flocons d'avoine dans 200ml de lait de soja (3-4 min). Ajouter quelques carrés de chocolat noir râpés."},{id:13,name:"Sorbet de fruits rouges",emoji:"🍓",recipe:"Mixer des fruits rouges congelés avec un peu de jus de citron et 1 c. à soupe de miel. Servir immédiatement ou remettre 30 min au congélateur."},{id:14,name:"Dattes",emoji:"🟫",recipe:"2-3 dattes nature en collation. Source naturelle de sucre et de fibres."},{id:15,name:"Bifidus nature",emoji:"🥛",recipe:"Un pot de bifidus nature, éventuellement avec une touche de cannelle ou de vanille."},{id:16,name:"Amandes / Cajou",emoji:"🌰",recipe:"Une poignée (25-30g) d'amandes ou de noix de cajou non salées. Bonnes graisses et énergie longue durée."},{id:17,name:"Pop-corn maison",emoji:"🍿",recipe:"Faire éclater du maïs nature à sec dans une casserole couverte, à feu moyen. Pas de beurre ni sucre ajouté."},{id:18,name:"Cottage cheese"
