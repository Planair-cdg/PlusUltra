e d'huile d'olive. Assaisonner d'ail, persil, sel."},{id:9,name:"Toast beurre de cacahuètes / confiture",emoji:"🥜",recipe:"Toaster une tranche de pain de mie complet. Étaler 1 c. à soupe de beurre de cacahuètes protéines puis une fine couche de confiture 0% sucres. Simple et rassasiant."},{id:10,name:"Céréales fruits secs / chocolat noir",emoji:"🍫",recipe:"Verser une portion de céréales dans un bol. Ajouter du lait de soja froid. Les pépites de chocolat noir et fruits secs apportent énergie et antioxydants."},{id:11,name:"Skyr",emoji:"🥛",recipe:"Servir 150-200g de skyr nature dans un bol. Ajouter des fruits frais ou une cuillère de miel. Très riche en protéines, faible en matières grasses."},{id:12,name:"Flocons d'avoine au chocolat noir",emoji:"🌾",recipe:"Cuire 50g de flocons d'avoine dans 200ml de lait de soja (3-4 min). Ajouter quelques carrés de chocolat noir râpés. Option : banane en rondelles par-dessus."},{id:13,name:"Sorbet de fruits rouges",emoji:"🍓",recipe:"Mixer des fruits rouges congelés (fraises, framboises...) avec un peu de jus de citron et 1 c. à soupe de miel. Mixer jusqu'à obtenir une texture sorbet bien lisse. Servir immédiatement ou remettre 30 min au congélateur."},{id:14,name:"Dattes",emoji:"🟫",recipe:"2-3 dattes nature en collation. Source naturelle de sucre et de fibres, parfait avant ou après l'effort."},{id:15,name:"Bifidus nature",emoji:"🥛",recipe:"Un pot de bifidus nature, éventuellement avec une touche de cannelle ou de vanille. Bon pour la flore intestinale."},{id:16,name:"Amandes / Cajou",emoji:"🌰",recipe:"Une poignée (25-30g) d'amandes ou de noix de cajou non salées. Bonnes graisses et énergie longue durée."},{id:17,name:"Pop-corn maison",emoji:"🍿",recipe:"Faire éclater du maïs nature à sec dans une casserole couverte, à feu moyen. Pas de beurre ni sucre ajouté. Collation légère et peu calorique."},{id:18,name:"Cottage cheese",emoji:"🧀",recipe:"200g de cottage cheese, nature ou avec une pincée de cannelle. Très riche en protéines, idéal en collation rassasiante."},{id:19,name:"Beurre d'amande maison",emoji:"🥜",recipe:"Mixer 200g d'amandes (torréfiées 10 min au four à 160°C) dans un robot puissant pendant 8-10 min, en raclant régulièrement, jusqu'à obtenir une pâte lisse. Ajouter une pincée de sel si désiré. Conserver dans un bocal hermétique."}],evening:[{id:1,name:"Jus d'oignon frais",emoji:"🧅",recipe:"Passer 1 oignon blanc dans un extracteur ou mixer puis filtrer. Boire 30-50ml dilué dans un peu d'eau. Connu pour ses propriétés anti-inflammatoires et détoxifiantes. À consommer avec modération."},{id:2,name:"Thé vert",emoji:"🍵",recipe:"Faire chauffer l'eau à 70-80°C (pas à ébullition). Laisser infuser 2-3 min maximum. Éviter le sucre. Riche en antioxydants, idéal pour terminer la journée."},{id:3,name:"Sardines",emoji:"🐟",recipe:"Sardines à l'huile d'olive ou nature, égouttées. Accompagner d'un filet de citron et de menthe fraîche ciselée. Riche en oméga-3 et protéines, idéal en repas léger du soir."},{id:4,name:"Lentilles vertes",emoji:"🫘",recipe:"Cuire les lentilles 20-25 min dans l'eau bouillante non salée. Égoutter, assaisonner avec huile d'olive, citron, ail et menthe fraîche. Riche en fibres et protéines végétales."},{id:5,name:"Infusion menthe-cacao",emoji:"🌿",recipe:"Faire infuser quelques feuilles de menthe fraîche dans de l'eau chaude avec une cuillère à café de poudre de cacao non sucrée. Réconfortant et faible en calories pour le soir."}]};const yd={ingredients:[{qty:"3",unit:"",name:"Pommes"},{qty:"200",unit:"g",name:"Betteraves"},{qty:"2",unit:"",name:"Carottes"},{qty:"20",unit:"g",name:"Gingembre frais"},{qty:"15",unit:"g",name:"Curcuma frais"},{qty:"1 pincée",unit:"",name:"Poivre noir"},{qty:"1 c. à soupe",unit:"",name:"Miel"},{qty:"½",unit:"",name:"Citron (jus)"},{qty:"300",unit:"ml",name:"Eau"}],note:"Quantité pour un mixeur — à répartir sur plusieurs jours"};const xd=[{id:1,name:"Jus d'oignons frais",time:"Soir",emoji:"🧅",done:!1,lastDone:null},{id:2,name:"Thé vert",time:"Soi
